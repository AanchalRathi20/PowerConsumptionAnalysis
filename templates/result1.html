<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFD700;
            display: flex;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #333;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85); 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 50px;
            max-width: 1200px;
            width: 100%;
            box-sizing: border-box;
            flex-wrap: wrap;
        }

        .content-section {
            flex: 1;
            min-width: 300px;
            padding-right: 30px;
            border-right: 1px solid #ddd; 
            box-sizing: border-box;
        }

        .image-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-left: 30px;
            box-sizing: border-box;
            position: relative;
            min-height: 400px; 
            overflow: hidden;
        }

        h1 {
            color: #000; 
            margin-bottom: 30px;
            text-align: left;
            font-size: 2.2em;
            font-weight: bold;
        }

        p {
            font-size: 1.5em; 
            color: #000; 
            margin-bottom: 20px;
            font-weight: bold; 
        }

        .meter-image {
            position: absolute; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            max-width: 90%; 
            height: auto;
            border-radius: 8px;
            z-index: 1; 
        }

        .coins-image {
            position: absolute; 
            bottom: 40px; 
            right: 20px;
            max-width: 30%; 
            height: auto;
            border-radius: 8px; 
            z-index: 2; 
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                flex-direction: column; 
                gap: 30px;
                padding: 20px;
            }

            .content-section {
                padding-right: 0;
                border-right: none;
                border-bottom: 1px solid #ddd;
                padding-bottom: 30px;
            }

            .image-section {
                padding-left: 0;
                padding-top: 30px;
                min-height: 350px;
            }

            .meter-image {
                max-width: 85%; 
                top: 45%; 
            }

            .coins-image {
                max-width: 25%;
                bottom: 30px;
                right: 15px;
            }

            h1, p {
                text-align: center; 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-section">
            <h1>Power Consumption Analysis</h1>
            <!-- This will display the prediction text passed from Flask -->
            <p>Global active power is [{{ prediction_text }}]</p>
        </div>

        <div class="image-section">
            <!-- Using the provided image URLs -->
            <img src="https://i5.walmartimages.com/seo/Smart-Electricity-Energy-Meter-Power-Consumption-Monitor-Din-Rail-Installation_6dc0d1bb-8e5a-4c24-9ac0-c4efb7536d68.fca695bc97eabd7ce16c7b41dced735d.jpeg" alt="Electricity Meter" class="meter-image">
            <img src="https://tse4.mm.bing.net/th/id/OIP.FVDq238aHD0033q-IB2CsgAAAA?pid=Api&P=0&h=220" alt="Coins" class="coins-image">
        </div>
    </div>
</body>
</html>
